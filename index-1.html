<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mis Redes Sociales</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --card: #111118;
      --border: rgba(255,255,255,0.07);
      --text: #f0eee8;
      --muted: #6b6b7a;
    }

    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #5c4aff, transparent 70%);
      top: -180px; left: -180px;
    }
    body::after {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #ff4a8d, transparent 70%);
      bottom: -150px; right: -150px;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .header {
      text-align: center;
      animation: fadeUp 0.6s ease both;
    }

    .avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5c4aff, #ff4a8d);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1rem;
      box-shadow: 0 0 0 3px var(--bg), 0 0 0 5px rgba(255,255,255,0.1);
    }

    .header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .header p {
      margin-top: 0.4rem;
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 300;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      border-radius: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      position: relative;
      overflow: hidden;
      transition: transform 0.22s cubic-bezier(.34,1.56,.64,1),
                  box-shadow 0.22s ease,
                  border-color 0.22s ease;
      animation: fadeUp 0.6s ease both;
    }

    .link-card:hover { transform: translateY(-3px) scale(1.015); }

    .link-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      border-radius: 4px 0 0 4px;
    }

    .link-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.04) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }
    .link-card:hover::after { transform: translateX(100%); }

    .fb::before { background: #1877F2; }
    .tt::before { background: #69C9D0; }
    .ig::before { background: linear-gradient(to bottom, #f09433, #bc1888); }
    .wa::before { background: #25D366; }

    .fb:hover { box-shadow: 0 8px 32px rgba(24,119,242,0.25);  border-color: rgba(24,119,242,0.35); }
    .tt:hover { box-shadow: 0 8px 32px rgba(105,201,208,0.22); border-color: rgba(105,201,208,0.3); }
    .ig:hover { box-shadow: 0 8px 32px rgba(220,39,67,0.25);   border-color: rgba(220,39,67,0.35); }
    .wa:hover { box-shadow: 0 8px 32px rgba(37,211,102,0.25);  border-color: rgba(37,211,102,0.35); }

    .icon-wrap {
      width: 46px; height: 46px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
    }
    .fb .icon-wrap { background: rgba(24,119,242,0.15); }
    .tt .icon-wrap { background: rgba(105,201,208,0.12); }
    .ig .icon-wrap { background: rgba(220,39,67,0.12); }
    .wa .icon-wrap { background: rgba(37,211,102,0.12); }

    .icon-wrap svg {
      width: 24px; height: 24px;
      transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
    }

    .fb:hover .icon-wrap { animation: iconPulse 0.5s ease forwards; }
    .tt:hover .icon-wrap { animation: iconPulse 0.5s ease forwards; }
    .ig:hover .icon-wrap { animation: iconPulse 0.5s ease forwards; }
    .wa:hover .icon-wrap { animation: iconPulse 0.5s ease forwards; }

    .fb:hover .icon-wrap svg { transform: rotate(-10deg) scale(1.25); }
    .tt:hover .icon-wrap svg { transform: rotate(12deg) scale(1.2); }
    .ig:hover .icon-wrap svg { transform: scale(1.3) rotate(-6deg); }
    .wa:hover .icon-wrap svg { transform: translateY(-4px) scale(1.2); }

    @keyframes iconPulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.15); }
      70%  { transform: scale(0.95); }
      100% { transform: scale(1.05); }
    }

    .info { flex: 1; }
    .info .name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: -0.01em;
    }
    .info .handle {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 1px;
    }

    .arrow {
      color: var(--muted);
      font-size: 1.1rem;
      transition: color 0.2s, transform 0.2s;
    }
    .link-card:hover .arrow { color: var(--text); transform: translateX(3px); }

    .link-card:nth-child(1) { animation-delay: 0.15s; }
    .link-card:nth-child(2) { animation-delay: 0.25s; }
    .link-card:nth-child(3) { animation-delay: 0.35s; }
    .link-card:nth-child(4) { animation-delay: 0.45s; }

    .footer {
      font-size: 0.75rem;
      color: var(--muted);
      animation: fadeUp 0.6s 0.55s ease both;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      animation: floatUp 0.8s ease-out forwards;
    }

    @keyframes floatUp {
      0%   { opacity: 0.8; transform: translateY(0) scale(1); }
      100% { opacity: 0;   transform: translateY(-45px) scale(0.2); }
    }

    @keyframes ripple { to { transform: scale(2.5); opacity: 0; } }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 360px) {
      .link-card { padding: 0.85rem 1rem; }
      .icon-wrap  { width: 40px; height: 40px; border-radius: 10px; }
      .icon-wrap svg { width: 20px; height: 20px; }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="avatar">✦</div>
    <h1>Síguenos</h1>
    <p>Encuéntranos en todas las plataformas</p>
  </div>

  <div class="links">

    <a class="link-card fb" href="https://facebook.com" target="_blank" rel="noopener">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z" stroke="#1877F2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="info">
        <div class="name">Facebook</div>
        <div class="handle">facebook.com/tupagina</div>
      </div>
      <span class="arrow">→</span>
    </a>

    <a class="link-card tt" href="https://tiktok.com" target="_blank" rel="noopener">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5" stroke="#69C9D0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="info">
        <div class="name">TikTok</div>
        <div class="handle">@tuusuario</div>
      </div>
      <span class="arrow">→</span>
    </a>

    <a class="link-card ig" href="https://instagram.com" target="_blank" rel="noopener">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5" stroke="url(#ig-grad)" stroke-width="2"/>
          <circle cx="12" cy="12" r="4" stroke="url(#ig-grad)" stroke-width="2"/>
          <circle cx="17.5" cy="6.5" r="1" fill="#dc2743"/>
          <defs>
            <linearGradient id="ig-grad" x1="2" y1="22" x2="22" y2="2" gradientUnits="userSpaceOnUse">
              <stop stop-color="#f09433"/>
              <stop offset="0.5" stop-color="#dc2743"/>
              <stop offset="1" stop-color="#bc1888"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="info">
        <div class="name">Instagram</div>
        <div class="handle">@tuusuario</div>
      </div>
      <span class="arrow">→</span>
    </a>

    <a class="link-card wa" href="https://wa.me/1234567890" target="_blank" rel="noopener">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" stroke="#25D366" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="info">
        <div class="name">WhatsApp</div>
        <div class="handle">Escríbenos directo</div>
      </div>
      <span class="arrow">→</span>
    </a>

  </div>

  <p class="footer">© 2026 · Todos los derechos reservados</p>
</div>

<script>
  const networkColors = {
    fb: ['#1877F2', '#4a9fff', '#a8d4ff'],
    tt: ['#69C9D0', '#ffffff', '#ff004f'],
    ig: ['#f09433', '#dc2743', '#bc1888'],
    wa: ['#25D366', '#a8ffcb', '#00e676'],
  };

  function getNetwork(card) {
    for (const net of Object.keys(networkColors)) {
      if (card.classList.contains(net)) return net;
    }
    return 'fb';
  }

  function spawnParticles(card, e) {
    const net    = getNetwork(card);
    const colors = networkColors[net];
    const rect   = card.getBoundingClientRect();

    for (let i = 0; i < 7; i++) {
      const dot   = document.createElement('span');
      dot.classList.add('particle');
      const size  = Math.random() * 7 + 4;
      const color = colors[Math.floor(Math.random() * colors.length)];
      const x     = e.clientX - rect.left + (Math.random() - 0.5) * 60;
      const y     = e.clientY - rect.top  + (Math.random() - 0.5) * 20;

      Object.assign(dot.style, {
        width:             size + 'px',
        height:            size + 'px',
        background:        color,
        left:              x + 'px',
        top:               y + 'px',
        animationDelay:    (Math.random() * 0.2) + 's',
        animationDuration: (0.6 + Math.random() * 0.4) + 's',
      });

      card.appendChild(dot);
      dot.addEventListener('animationend', () => dot.remove());
    }
  }

  function spawnRipple(card, e) {
    const ripple = document.createElement('span');
    const rect   = card.getBoundingClientRect();
    const size   = Math.max(rect.width, rect.height);

    Object.assign(ripple.style, {
      position:        'absolute',
      width:           size + 'px',
      height:          size + 'px',
      left:            (e.clientX - rect.left - size / 2) + 'px',
      top:             (e.clientY - rect.top  - size / 2) + 'px',
      borderRadius:    '50%',
      background:      'rgba(255,255,255,0.08)',
      transform:       'scale(0)',
      animation:       'ripple 0.55s ease-out forwards',
      pointerEvents:   'none',
      zIndex:          '10',
    });

    card.appendChild(ripple);
    ripple.addEventListener('animationend', () => ripple.remove());
  }

  document.querySelectorAll('.link-card').forEach(card => {
    card.addEventListener('mouseenter', e => spawnParticles(card, e));
    card.addEventListener('click',      e => spawnRipple(card, e));
  });

  const footer = document.querySelector('.footer');
  if (footer) footer.textContent = `© ${new Date().getFullYear()} · Todos los derechos reservados`;
</script>
</body>
</html>
